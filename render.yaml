services:
  - type: web
    name: vision-frontend
    runtime: static
    rootDir: vision
    buildCommand: sh build-static.sh
    staticPublishPath: public
    autoDeploy: true
  - type: web
    name: vision-gateway
    runtime: python
    rootDir: .
    plan: starter
    buildCommand: pip install -r requirements-vision-gateway.txt
    startCommand: python scripts/vision_gateway.py
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: VISION_GATEWAY_HOST
        value: 0.0.0.0
      - key: VISION_GATEWAY_VISION_ROOT
        value: vision
      - key: VISION_GATEWAY_PUBLIC_BASE_URL
        sync: false
      - key: VISION_GATEWAY_CORS_ALLOW_ORIGINS
        value: https://visionlabs.cloud,https://www.visionlabs.cloud,https://visionstudiolab.com,https://www.visionstudiolab.com,https://vision-frontend-6g09.onrender.com
      - key: VISION_GATEWAY_DEFAULT_GENERATION_PROVIDER
        value: auto
      - key: VISION_GATEWAY_DEFAULT_GENERATION_QUALITY
        value: auto
      - key: VISION_KLING_API_FIRST
        value: true
      - key: KLING_ACCESS_KEY
        sync: false
      - key: KLING_SECRET_KEY
        sync: false
      - key: KLING_API_VIDEO_MODEL
        value: kling-v2-1
      - key: KLING_API_BASE_URL
        value: https://api-singapore.klingai.com
      - key: VISION_KLING_COOKIE_HEADER
        sync: false
      - key: VISION_KLING_REQUEST_HEADERS_JSON
        sync: false
      - key: VISION_KLING_SUBMIT_PAYLOAD_JSON
        sync: false
      - key: VISION_KLING_IMAGE_SUBMIT_PAYLOAD_JSON
        sync: false
      - key: VISION_KLING_IMAGE_FAST_RESOLUTION
        value: 1k
      - key: VISION_KLING_IMAGE_STANDARD_RESOLUTION
        value: 2k
      - key: VISION_KLING_IMAGE_PREMIUM_RESOLUTION
        value: 4k
      - key: VISION_KLING_IMAGE_FAST_SHOW_PRICE
        value: "0"
      - key: VISION_KLING_IMAGE_STANDARD_SHOW_PRICE
        value: "0"
      - key: VISION_KLING_IMAGE_PREMIUM_SHOW_PRICE
        value: "200"
      - key: VISION_KLING_IMAGE_FAST_UNLIMITED
        value: "true"
      - key: VISION_KLING_IMAGE_STANDARD_UNLIMITED
        value: "true"
      - key: VISION_KLING_IMAGE_PREMIUM_UNLIMITED
        value: "false"
      - key: BYTEPLUS_API_KEY
        sync: false
      - key: BYTEPLUS_BASE_URL
        value: https://ark.ap-southeast.bytepluses.com/api/v3
      - key: BYTEPLUS_SEEDANCE_FAST_MODEL
        sync: false
      - key: BYTEPLUS_SEEDANCE_STANDARD_MODEL
        sync: false
      - key: BYTEPLUS_SEEDANCE_PREMIUM_MODEL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_VEO_FAST_MODEL
        value: veo-3.1-fast-generate-preview
      - key: GOOGLE_VEO_FAST_RESOLUTION
        value: 720p
      - key: GOOGLE_VEO_STANDARD_MODEL
        value: veo-3.1-generate-preview
      - key: GOOGLE_VEO_STANDARD_RESOLUTION
        value: 1080p
      - key: GOOGLE_VEO_PREMIUM_MODEL
        value: veo-3.1-generate-preview
      - key: GOOGLE_VEO_PREMIUM_RESOLUTION
        value: 4k
      - key: GOOGLE_IMAGE_MODEL
        value: imagen-4.0-generate-001
      - key: GOOGLE_IMAGE_FALLBACK_MODELS
        value: imagen-4.0-fast-generate-001
      - key: GOOGLE_PROMPT_MODEL
        value: gemini-2.5-pro
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: VISION_NOTIFY_EMAIL_TO
        sync: false
      - key: VISION_NOTIFY_EMAIL_FROM
        sync: false
      - key: VISION_NOTIFY_SMTP_HOST
        sync: false
      - key: VISION_NOTIFY_SMTP_PORT
        value: 587
      - key: VISION_NOTIFY_SMTP_USERNAME
        sync: false
      - key: VISION_NOTIFY_SMTP_PASSWORD
        sync: false
      - key: VISION_NOTIFY_SMTP_USE_SSL
        value: false
      - key: VISION_NOTIFY_SMTP_USE_STARTTLS
        value: true
      - key: VISION_ACCESS_SECRET
        sync: false
      - key: VISION_USER_SECRET
        sync: false
      - key: VISION_ADMIN_TOKEN
        sync: false
      - key: VISION_FRONTEND_BASE_URL
        value: https://visionstudiolab.com
      - key: TRACKING_ENABLED
        value: true
      - key: TRACKING_DATABASE_URL
        sync: false
      - key: TRACKING_DEBUG_JSONL_ENABLED
        value: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: META_PIXEL_ENABLED
        value: false
      - key: META_PIXEL_ID
        sync: false
      - key: META_CAPI_ENABLED
        value: false
      - key: META_CAPI_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_PIXEL_ENABLED
        value: false
      - key: TIKTOK_PIXEL_ID
        sync: false
      - key: TIKTOK_EVENTS_API_ENABLED
        value: false
      - key: TIKTOK_EVENTS_API_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_TAG_ENABLED
        value: false
      - key: GOOGLE_TAG_ID
        sync: false
      - key: GOOGLE_ENHANCED_CONVERSIONS_ENABLED
        value: false
      - key: GOOGLE_ADS_CONVERSION_LABEL
        sync: false
